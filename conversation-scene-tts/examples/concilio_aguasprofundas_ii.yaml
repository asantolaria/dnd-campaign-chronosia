# Segundo Concilio de Aguasprofundas (escena de sala).
# Sugerencia: python render_conversation.py examples/concilio_aguasprofundas_ii.yaml -o output/concilio_ii.mp3 --pause-ms 450
#
# Solo castellano (es-ES): Edge TTS solo ofrece 3 voces neurales de España — Alvaro, Elvira, Ximena.
# Varios personajes comparten timbre; se distinguen por rate/pitch/volume y por el orden del diálogo.
# Notas: no hay efectos de mesa; "golpe de anillo" va como réplica con más fuerza en prosodia.

title: "Segundo Concilio de Aguasprofundas"

characters:
  narrador:
    name: Narrador
    voice: es-ES-ElviraNeural
    rate: "-4%"
    pitch: "-2Hz"
    volume: "-4%"
  leosin:
    name: Leosin
    voice: es-ES-AlvaroNeural
    rate: "-8%"
    pitch: "-4Hz"
    volume: "-18%"
  laeral:
    name: Lady Laeral
    voice: es-ES-XimenaNeural
    rate: "+2%"
    pitch: "+2Hz"
    volume: "+4%"
  ulder:
    name: Ulder Ravengard
    voice: es-ES-AlvaroNeural
    rate: "-2%"
    pitch: "-8Hz"
    volume: "+0%"
  remallia:
    name: Remallia Haventree
    voice: es-ES-ElviraNeural
    rate: "+2%"
    pitch: "+4Hz"
    volume: "+4%"
  ontharr:
    name: Ontharr Frume
    voice: es-ES-AlvaroNeural
    rate: "+12%"
    pitch: "+6Hz"
    volume: "+12%"
  isteval:
    name: Sir Isteval
    voice: es-ES-AlvaroNeural
    rate: "-6%"
    pitch: "-2Hz"
    volume: "-4%"
  dagult:
    name: Lord Dagult Neverember
    voice: es-ES-AlvaroNeural
    rate: "+6%"
    pitch: "-4Hz"
    volume: "+10%"
  rian:
    name: Rian Nightshade
    voice: es-ES-XimenaNeural
    rate: "-2%"
    pitch: "-4Hz"
    volume: "+0%"

lines:
  - speaker: narrador
    text: "La misma cámara donde jurasteis frentes huele a tinta, cuero y sudor frío. Mapas enrollados, cajas de sellos, ayudantes que susurran bajas y toneladas de grano. Los aventureros, en sitial de honor o de pie detrás de Laeral, según prestigio."

  - speaker: leosin
    text: "Lo de hoy no es solo formalidad. Quieren ver si la alianza aguanta lo del bosque… y hay quien mirará a Neverwinter y al Muelle."

  - speaker: laeral
    text: "El juicio ha hablado. La Corona del Bosque ha hablado. Ahora habla la guerra: quiero informes, no discursos, sobre dónde sangramos y por qué el enemigo parece llegar antes que nuestros propios cuervos."

  - speaker: laeral
    text: "El juicio ha cerrado una herida élfica. Abramos la otra: ¿por qué perdemos dónde y cuándo más nos conviene?"
    rate: "+4%"
    pitch: "+4Hz"
    volume: "+10%"

  - speaker: ulder
    text: "El golpe al puerto o al convoy: el día que este Consejo selló la ruta de suministro que no estaba en ningún bando público, no fue mala suerte. Fue puntería."

  - speaker: remallia
    text: "En Everlund y el Alto Bosque pasó lo mismo: el peor momento del asedio, el golpe de Chuth, la columna de refuerzos… coincidieron con debates que aún no habían bajado al capitán de campo. Como si alguien oyera esta sala antes que el soldado de abajo."

  - speaker: ontharr
    text: "¡O siempre llegamos tarde, o siempre nos dan donde peor nos conviene! ¡No me creo la suerte en tres costas!"
    rate: "+18%"
    pitch: "+10Hz"
    volume: "+16%"

  - speaker: laeral
    text: "Basta de nombres sin pruebas. Si abrimos la caza de brujas aquí, gana el Culto: nos comeremos entre nosotros. Auditoría de mensajeros. Duplicado de actas. Silencio hasta tener papeles."
    rate: "+1%"
    pitch: "+0Hz"
    volume: "+6%"

  - speaker: remallia
    text: "Los Arpistas ya cruzábamos fechas antes del juicio. Neronvain no inventó el agujero: lo confirmó. Alguien con acceso a lo que esta mesa sabe."
    rate: "+2%"
    pitch: "+2Hz"

  - speaker: isteval
    text: "Cormyr no ha perdido un solo barco por culpa de Suzail. Si hay filtración, que se demuestre, no con miradas."

  - speaker: leosin
    text: "El Culto no adivina: compra, roba o recibe. La pregunta es qué canal."
    rate: "-5%"
    volume: "-14%"

  - speaker: dagult
    text: "Antes de que nadie hable de honor como si el honor pagara murallas: Rian Nightshade ha mantenido abiertos suministros e información cuando otros solo tenían sermones. Está aquí con mi confianza. Si alguien tiene preguntas sobre su nombre o su sangre, que las haga ahora y a la cara, no al oído del rumorcillo de taberna."

  - speaker: rian
    text: "Agradezco el asiento. La Red Negra vende lo que otros temen nombrar: yo no presido este Consejo. Asesoro. Y no he vendido actas de esta mesa."
    rate: "-4%"
    pitch: "-6Hz"
    volume: "+2%"

  - speaker: ontharr
    text: "¿Vamos a fingir que el olor a oro del Muelle no tiene nada que ver con huecos en nuestras líneas? Esa tiefling vende secretos por oficio. No digo que sea la filtradora: digo que huele como el problema."
    rate: "+10%"
    pitch: "+4Hz"
    volume: "+8%"

  - speaker: rian
    text: "Niego categóricamente filtrar sellos de Aguasprofundas. Ofrezco libros en Neverwinter bajo auditoría conjunta. Acusar a la Zhent sin prueba es un regalo al Culto."
    rate: "+0%"
    pitch: "-2Hz"
    volume: "+4%"

  - speaker: dagult
    text: "¿Acusáis a mi casa de espiar a la alianza? Prueba."
    rate: "+10%"
    pitch: "-2Hz"
    volume: "+14%"

  - speaker: laeral
    text: "Señoría: basta. Guardad los nombres para cuando tengáis papeles."
    rate: "+3%"
    pitch: "+2Hz"
    volume: "+8%"

  - speaker: laeral
    text: "Que quede registrado: la Máscara del Dragón Verde y las demás evidencias del juicio pasan a inventario sellado en el Castillo. Próximos frentes, según despacho."
    rate: "+0%"
    pitch: "+0Hz"
    volume: "+4%"
