# Relato en tercera persona del AN10 — Parte II: Segundo Concilio (según 05_Aventuras/AN10_Juicio_Melandrach_y_Concilio_Aguasprofundas.md).
# Pleno posterior al veredicto: informe, Neverember y Rian, tensión del Muelle, cierre con inventario e informe de guerra hacia «Sombras en el Consejo».
