site_name: Chronosia — El Reino del Tiempo Fracturado
site_description: Campaña de D&D 5e · manual navegable
site_url: https://asantolaria.github.io/dnd-campaign-chronosia/
docs_dir: Chronosia_Campana_Profesional
use_directory_urls: true

theme:
  name: material
  language: es
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: brown
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: brown
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Modo claro

plugins:
  - search:
      lang: es

hooks:
  - mkdocs_hooks.py

# No construir los exports ni copiar las imágenes originales (pesadas, gitignoradas).
# La web usa las copias optimizadas de assets/web/ (ver mkdocs_hooks.py).
exclude_docs: |
  exports/
  agents.md
  assets/mapas/
  assets/bestiario/
  assets/objetos_magicos/

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
