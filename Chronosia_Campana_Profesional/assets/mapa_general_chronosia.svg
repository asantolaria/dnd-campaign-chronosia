<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1400" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <radialGradient id="sea" cx="45%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#b6cdc7"/>
      <stop offset="100%" stop-color="#90aaa6"/>
    </radialGradient>
    <linearGradient id="land" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9eef0"/>
      <stop offset="18%" stop-color="#cdc69a"/>
      <stop offset="55%" stop-color="#c2bd86"/>
      <stop offset="80%" stop-color="#c79a63"/>
      <stop offset="100%" stop-color="#b9663f"/>
    </linearGradient>
    <linearGradient id="parch" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#efe3c6"/>
      <stop offset="100%" stop-color="#e3d2ad"/>
    </linearGradient>
    <style>
      .reg  { fill:#f4ecd6; stroke-width:4; }
      .num  { font-size:24px; font-weight:bold; fill:#3a2e1c; text-anchor:middle; }
      .lbl  { font-size:16px; fill:#3a2e1c; text-anchor:middle; font-style:italic; }
      .sea  { font-size:30px; fill:#5f7b77; text-anchor:middle; letter-spacing:3px; font-style:italic; }
      .leg  { font-size:18px; fill:#3a2e1c; }
      .legb { font-size:18px; fill:#3a2e1c; font-weight:bold; }
      .small{ font-size:13.5px; fill:#5b4a30; }
      .T { stroke:#c8922e; } .D { stroke:#6d5aa6; }
    </style>
  </defs>

  <!-- frame & parchment -->
  <rect x="0" y="0" width="1400" height="1400" fill="url(#parch)"/>
  <rect x="18" y="18" width="1364" height="1364" fill="none" stroke="#7a5c34" stroke-width="6"/>
  <rect x="30" y="30" width="1340" height="1340" fill="none" stroke="#7a5c34" stroke-width="2"/>

  <!-- sea area (map zone) -->
  <rect x="40" y="120" width="940" height="1240" fill="url(#sea)"/>

  <!-- title cartouche -->
  <rect x="60" y="42" width="900" height="70" rx="8" fill="#f4ecd6" stroke="#7a5c34" stroke-width="2"/>
  <text x="510" y="78" text-anchor="middle" font-size="34" font-weight="bold" fill="#3a2e1c" letter-spacing="2">CHRONOSIA</text>
  <text x="510" y="100" text-anchor="middle" font-size="16" font-style="italic" fill="#5b4a30">El Reino del Tiempo Fracturado — Mapa General</text>

  <!-- landmass -->
  <path d="M 470 175
           C 380 210, 332 330, 362 432
           C 300 522, 322 642, 384 702
           C 344 802, 362 922, 472 1040
           C 560 1098, 644 1000, 644 900
           C 722 822, 700 700, 662 642
           C 702 540, 700 462, 622 422
           C 602 322, 560 232, 470 175 Z"
        fill="url(#land)" stroke="#6f5a37" stroke-width="3"/>

  <!-- north ice hint -->
  <path d="M 470 175 C 410 205, 372 280, 372 350 L 470 320 L 600 360 C 620 280, 560 220, 470 175 Z" fill="#eef3f5" opacity="0.55"/>
  <!-- mountains north -->
  <g fill="#8a7f63" stroke="#5f5640" stroke-width="1.5">
    <path d="M 430 250 l 26 -46 l 26 46 z"/><path d="M 470 262 l 30 -54 l 30 54 z"/><path d="M 520 252 l 24 -42 l 24 42 z"/>
  </g>
  <!-- volcano south -->
  <g><path d="M 504 1000 l 38 -70 l 38 70 z" fill="#7a4a32" stroke="#4f2f1f" stroke-width="1.5"/>
     <path d="M 530 952 q 12 -22 24 0 q -12 14 -24 0 z" fill="#e3622e"/></g>

  <!-- seas labels -->
  <text x="150" y="430" class="sea">Mar</text><text x="150" y="466" class="sea">Occidental</text>
  <text x="870" y="900" class="sea">Mar</text><text x="870" y="936" class="sea">Oriental</text>

  <!-- compass -->
  <g transform="translate(905,1230)" stroke="#6f5a37" fill="#6f5a37">
    <circle r="34" fill="none" stroke-width="2"/>
    <path d="M0,-40 L7,0 L0,40 L-7,0 Z" fill="#a8814a"/>
    <path d="M-40,0 L0,7 L40,0 L0,-7 Z" fill="#cdbb8e"/>
    <text x="0" y="-44" text-anchor="middle" font-size="16">N</text>
  </g>

  <!-- east island cluster (Llanuras de la Compresión, region 6) -->
  <g fill="#c2bd86" stroke="#6f5a37" stroke-width="2">
    <ellipse cx="820" cy="540" rx="58" ry="40"/><ellipse cx="900" cy="600" rx="26" ry="18"/><ellipse cx="770" cy="610" rx="20" ry="14"/>
  </g>
  <!-- west archipelago (Barbanegra, region 8) -->
  <g fill="#c2bd86" stroke="#6f5a37" stroke-width="2">
    <ellipse cx="175" cy="700" rx="46" ry="32"/><ellipse cx="120" cy="770" rx="22" ry="15"/><ellipse cx="235" cy="760" rx="18" ry="12"/><ellipse cx="150" cy="640" rx="16" ry="11"/>
  </g>
  <!-- tiny pirate ship -->
  <g transform="translate(250,650)" stroke="#6f5a37" stroke-width="1.5" fill="none"><path d="M-12,4 q12,8 24,0 z" fill="#8a7f63"/><line x1="6" y1="4" x2="6" y2="-14"/><path d="M6,-14 l10,8 l-10,4 z" fill="#cdbb8e"/></g>

  <!-- ===== region nodes ===== helper: circle + number ===== -->
  <!-- 1 Espiral Inversa (T) -->
  <circle class="reg T" cx="432" cy="372" r="22"/><text class="num" x="432" y="380">1</text>
  <!-- 2 Jardin Tiempos Gemelos (mixed) -->
  <circle class="reg" cx="618" cy="560" r="22" stroke="#c8922e" stroke-width="4"/>
  <path d="M618,538 a22,22 0 0,1 0,44 z" fill="#ece2ff"/><circle cx="618" cy="560" r="22" fill="none" stroke="#6d5aa6" stroke-width="4" stroke-dasharray="0 69 69"/>
  <text class="num" x="618" y="568">2</text>
  <!-- 3 Glacialis (D) + portal -->
  <circle cx="470" cy="300" r="29" fill="none" stroke="#3f7e9a" stroke-width="2" stroke-dasharray="4 4"/>
  <circle class="reg D" cx="470" cy="300" r="22"/><text class="num" x="470" y="308">3</text>
  <!-- 4 Ruinas del Tiempo Perdido (T) -->
  <circle class="reg T" cx="578" cy="438" r="22"/><text class="num" x="578" y="446">4</text>
  <!-- 5 Abismo de los Posibles (T) -->
  <circle class="reg T" cx="392" cy="664" r="22"/><text class="num" x="392" y="672">5</text>
  <!-- 6 Llanuras de la Compresion (D) + portal Avernus -->
  <circle cx="820" cy="540" r="29" fill="none" stroke="#a8462f" stroke-width="2" stroke-dasharray="4 4"/>
  <circle class="reg D" cx="820" cy="540" r="22"/><text class="num" x="820" y="548">6</text>
  <!-- 7 Ciudad de Veldrisza (D) + portal Underdark (subterranea) -->
  <circle cx="560" cy="752" r="29" fill="none" stroke="#5a3f6e" stroke-width="2" stroke-dasharray="4 4"/>
  <circle class="reg D" cx="560" cy="752" r="22"/><text class="num" x="560" y="760">7</text>
  <!-- 8 Archipielago de Barbanegra (D) -->
  <circle class="reg D" cx="175" cy="700" r="22"/><text class="num" x="175" y="708">8</text>
  <!-- 9 Mansion de la Sed Eterna (T) + portal Barovia (mist) -->
  <ellipse cx="392" cy="852" rx="70" ry="36" fill="#dfe4e2" opacity="0.55"/>
  <circle cx="392" cy="846" r="29" fill="none" stroke="#5b5b66" stroke-width="2" stroke-dasharray="4 4"/>
  <circle class="reg T" cx="392" cy="846" r="22"/><text class="num" x="392" y="854">9</text>
  <!-- 10 Calderas Dimensionales (D) + portal Fuego -->
  <circle cx="542" cy="982" r="29" fill="none" stroke="#c0502a" stroke-width="2" stroke-dasharray="4 4"/>
  <circle class="reg D" cx="542" cy="982" r="22"/><text class="num" x="542" y="990">10</text>

  <!-- Cronopolis hub (center) -->
  <g transform="translate(492,548)">
    <circle r="30" fill="#f4ecd6" stroke="#a8814a" stroke-width="3"/>
    <path d="M0,-20 L5,-6 L20,-6 L8,3 L13,18 L0,9 L-13,18 L-8,3 L-20,-6 L-5,-6 Z" fill="#c8922e" stroke="#7a5c34" stroke-width="1"/>
  </g>
  <text class="legb" x="492" y="528" text-anchor="middle" font-size="17">CRONÓPOLIS</text>

  <!-- Torre de la Eternidad (hidden north) -->
  <g transform="translate(556,168)"><rect x="-9" y="-26" width="18" height="34" fill="#6d5aa6" stroke="#3a2e1c" stroke-width="1.5"/><path d="M-9,-26 l9,-12 l9,12 z" fill="#3a2e1c"/></g>
  <text class="small" x="556" y="138" text-anchor="middle" font-style="italic">Torre de la Eternidad ✦</text>

  <!-- Valle de la Aguja Suspendida (caida) -->
  <text class="small" x="430" y="226" text-anchor="middle">⚰ Valle de la Aguja Susp.</text>

  <!-- ================= LEGEND PANEL ================= -->
  <rect x="1000" y="120" width="370" height="1240" rx="8" fill="#f4ecd6" stroke="#7a5c34" stroke-width="3"/>
  <text x="1185" y="162" text-anchor="middle" class="legb" font-size="24">REGIONES</text>
  <line x1="1020" y1="178" x2="1350" y2="178" stroke="#7a5c34" stroke-width="1.5"/>

  <!-- legend rows -->
  <g>
    <!-- row template: dot, number-name, sub -->
    <circle cx="1032" cy="210" r="9" fill="#c8922e"/><text class="legb" x="1050" y="208">1 · La Espiral Inversa</text><text class="small" x="1050" y="226">Serapis (Temporal) · nv 4-5</text>
    <circle cx="1032" cy="262" r="9" fill="#c8922e"/><circle cx="1032" cy="262" r="9" fill="#6d5aa6" clip-path="inset(0 0 0 9px)"/><path d="M1032,253 a9,9 0 0,1 0,18 z" fill="#6d5aa6"/><text class="legb" x="1050" y="260">2 · Jardín de los Tiempos Gemelos</text><text class="small" x="1050" y="278">Medusa + Las Gemelas (T/D) · nv 5-7</text>
    <circle cx="1032" cy="314" r="9" fill="#6d5aa6"/><text class="legb" x="1050" y="312">3 · Glacialis ⟳</text><text class="small" x="1050" y="330">Ymir (Dimensional) · nv 6-7 · → P. del Agua</text>
    <circle cx="1032" cy="366" r="9" fill="#c8922e"/><text class="legb" x="1050" y="364">4 · Ruinas del Tiempo Perdido</text><text class="small" x="1050" y="382">Tempus (Temporal) · nv 6-7</text>
    <circle cx="1032" cy="418" r="9" fill="#c8922e"/><text class="legb" x="1050" y="416">5 · El Abismo de los Posibles</text><text class="small" x="1050" y="434">Varrak (Temporal) · nv 7-8</text>
    <circle cx="1032" cy="470" r="9" fill="#6d5aa6"/><text class="legb" x="1050" y="468">6 · Llanuras de la Compresión ⟳</text><text class="small" x="1050" y="486">Dimensionalis (Dim.) · nv 7-8 · → Avernus</text>
    <circle cx="1032" cy="522" r="9" fill="#6d5aa6"/><text class="legb" x="1050" y="520">7 · Ciudad de Veldrisza ⟳</text><text class="small" x="1050" y="538">Veldrisza (Dim.) · nv 8-9 · → Underdark</text>
    <circle cx="1032" cy="574" r="9" fill="#6d5aa6"/><text class="legb" x="1050" y="572">8 · Archipiélago de Barbanegra</text><text class="small" x="1050" y="590">Edward Teach (Dim.) · nv 8-9</text>
    <circle cx="1032" cy="626" r="9" fill="#c8922e"/><text class="legb" x="1050" y="624">9 · Mansión de la Sed Eterna ⟳</text><text class="small" x="1050" y="642">Vorthak (Temporal) · nv 9 · → Barovia</text>
    <circle cx="1032" cy="678" r="9" fill="#6d5aa6"/><text class="legb" x="1050" y="676">10 · Las Calderas Dimensionales ⟳</text><text class="small" x="1050" y="694">Ignis (Dim.) · nv 9-10 · → P. del Fuego</text>
  </g>

  <line x1="1020" y1="720" x2="1350" y2="720" stroke="#7a5c34" stroke-width="1.5"/>
  <text class="legb" x="1185" y="748" text-anchor="middle" font-size="20">PUNTOS CLAVE</text>
  <g transform="translate(1024,772)">
    <path d="M0,-2 L5,-12 L18,-12 L8,-4 L12,8 L0,1 L-12,8 L-8,-4 L-18,-12 L-5,-12 Z" fill="#c8922e" stroke="#7a5c34" stroke-width="0.8" transform="translate(8,4) scale(0.7)"/>
    <text class="leg" x="26" y="6">Cronópolis — bastión-hub (sin distorsión)</text>
  </g>
  <g transform="translate(1024,808)"><rect x="2" y="-8" width="11" height="16" fill="#6d5aa6"/><text class="leg" x="26" y="6">Torre de la Eternidad ✦ (clímax, oculta)</text></g>
  <g transform="translate(1024,844)"><text class="leg" x="0" y="6">⚰ Valle de la Aguja Suspendida (Thyra, caída)</text></g>

  <line x1="1020" y1="876" x2="1350" y2="876" stroke="#7a5c34" stroke-width="1.5"/>
  <text class="legb" x="1185" y="904" text-anchor="middle" font-size="20">LEYENDA</text>
  <g transform="translate(1024,930)">
    <circle cx="9" cy="0" r="9" fill="#c8922e"/><text class="leg" x="28" y="6">Lugarteniente Temporal (Amaunator)</text>
    <circle cx="9" cy="34" r="9" fill="#6d5aa6"/><text class="leg" x="28" y="40">Lugarteniente Dimensional (Voidar)</text>
    <path d="M9,60 a9,9 0 0,1 0,18 z" fill="#6d5aa6"/><path d="M9,60 a9,9 0 0,0 0,18 z" fill="#c8922e"/><text class="leg" x="28" y="74">Región con ambos poderes</text>
    <circle cx="9" cy="102" r="11" fill="none" stroke="#3f7e9a" stroke-width="2" stroke-dasharray="4 4"/><text class="leg" x="28" y="108">⟳ Portal del Nexo (→ otro plano)</text>
  </g>
  <text class="small" x="1185" y="1110" text-anchor="middle" font-style="italic">Al estabilizar Chronosia, los portales ⟳</text>
  <text class="small" x="1185" y="1130" text-anchor="middle" font-style="italic">se abren como salidas a otras campañas.</text>

  <text x="1185" y="1330" text-anchor="middle" class="small">Mapa esquemático · v2 (canon nivel 10 + nexo planar)</text>
</svg>
